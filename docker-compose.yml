services:
  ml-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://mluser:mlpassword@postgres:5432/ml_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lab-network

  postgres:
    image: postgres:16-alpine
    container_name: ml-postgres
    environment:
      POSTGRES_USER: mluser
      POSTGRES_PASSWORD: mlpassword
      POSTGRES_DB: ml_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge

volumes:
  postgres_data:

